# Pre-commit hooks for netbox-pyats
#
# Defense-in-depth secret/PII leakage gate (ATW-116). The gitleaks hook scans
# the staged diff for the Tailscale-CGNAT leakage class (and all upstream
# gitleaks defaults) before every commit lands, so a secret in a diff is
# caught locally — not after it reaches the public GitHub repo and a PR
# description.
#
# Install:
#   pip install pre-commit
#   pre-commit install
#
# Run manually (all files):
#   pre-commit run gitleaks --all-files
#
# The gitleaks rules live in .gitleaks.toml. Stewardship: CTO owns standards;
# Security Engineer owns execution (ATW-55).

repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks
        name: gitleaks (secret/PII leakage gate)
        args:
          - --config=.gitleaks.toml
          - --redact
          - --verbose
        # Commit messages and PR descriptions are the documented leakage
        # surface (ATW-114), so scan the full commit, not just the file diff.
        # gitleaks' pre-commit hook scans staged files by default; the
        # --source=. override makes it scan the whole working tree so a
        # secret added to an untracked-but-staged file is not missed.
        pass_filenames: false
        always_run: true