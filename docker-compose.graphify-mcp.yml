# Graphify MCP HTTP server — multi-host / shared-service compose overlay.
#
# This is NOT part of the default dev stack. The default stack
# (docker-compose.dev.yml) uses the stdio graphify-mcp server wired into
# OpenCode's MCP config (see GRAPHIFY_MCP.md), which is simpler and safer on
# a single dev host. Bring this overlay up only when Atw agents span more
# than one host and need to reach a shared code-graph server over HTTP with
# a Bearer api-key — the deferred upgrade path from ATW-40, owned by ATW-42.
#
# Hardening (ATW-42):
#   - Loopback-only publish. The only published port is
#     `127.0.0.1:${GRAPHIFY_MCP_PORT:-8090}:8080`. Do NOT widen to 0.0.0.0 or
#     drop the IP prefix — the HTTP api-key is a defense-in-depth control,
#     not a substitute for not being on the public IP. Remote hosts reach
#     the server over SSH port forwarding
#     (`ssh -L 8090:127.0.0.1:8090 <dev-host>`) or a private network, never
#     by widening this binding.
#   - Isolated user-defined bridge (`graphify-net`). The server has no
#     network path to the dev stack's `devnet` and vice versa; it cannot
#     reach postgres/redis/netbox and they cannot reach it.
#   - CPU + memory cap so a runaway graph traversal cannot starve the host
#     or the dev stack.
#   - Healthcheck (see dev/graphify-mcp/healthcheck.py) verifies the server
#     is up AND enforcing the api-key (401 on unauthenticated POST). A
#     misconfigured server with no api-key fails the healthcheck.
#   - `restart: unless-stopped` so the service self-recovers.
#   - The api-key is delivered via the compose `secrets:` mechanism from a
#     file on the host (dev/graphify-mcp/.env by default, generated by
#     scripts/graphify-mcp-key.sh). The key is never baked into the image
#     and never appears in `docker inspect` healthcheck output.
#
# Usage (from a worktree, after generating the api-key):
#   scripts/graphify-mcp-key.sh generate   # writes dev/graphify-mcp/api-key
#   docker compose -f docker-compose.dev.yml \
#     -f docker-compose.graphify-mcp.yml up -d graphify-mcp
#   docker compose -f docker-compose.dev.yml \
#     -f docker-compose.graphify-mcp.yml logs -f graphify-mcp
#
# Tear down (also removes the graphify-mcp volumes; does not touch the dev
# stack's volumes):
#   docker compose -f docker-compose.dev.yml \
#     -f docker-compose.graphify-mcp.yml down -v
#
# See docs/graphify-mcp-http.md for the full bring-up, secret rotation, and
# client-wiring walkthrough.

services:
  graphify-mcp:
    build:
      context: .
      dockerfile: dev/graphify-mcp/Dockerfile
    image: atw/graphify-mcp:dev
    restart: unless-stopped
    # Bind inside the container to 0.0.0.0 so the service is reachable across
    # the graphify-net bridge (other containers on that network can hit it
    # by name). The host-side publish below is loopback-only, so this does
    # NOT expose the server on the host's public IP.
    command:
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8080"
      - "--graph"
      - "/graph/graph.json"
    environment:
      # The api-key is read from the file mounted by `secrets:` below.
      # graphify-mcp reads GRAPHIFY_API_KEY automatically (no --api-key flag
      # needed), which keeps the key out of the process argv and
      # `docker inspect`.
      GRAPHIFY_API_KEY_FILE: /run/secrets/graphify_api_key
    secrets:
      # The entrypoint reads the secret as root then drops to the `graphify`
      # user (uid 1001), so the secret's in-container owner/mode doesn't
      # matter — root can read any file. Compose preserves the host file's
      # owner and mode (0600 owned by the operator on the dev host), which
      # is why the entrypoint does the root→runuser dance rather than
      # reading the secret directly as the non-root user.
      - graphify_api_key
    ports:
      # Loopback-only publish. Remote hosts use SSH port forwarding, not a
      # widened binding. GRAPHIFY_MCP_PORT lets each worktree claim a unique
      # loopback port (see scripts/dev-worktree.sh); defaults to 8090 when
      # run without a per-worktree .env.
      - "127.0.0.1:${GRAPHIFY_MCP_PORT:-8090}:8080"
    networks:
      - graphify-net
    volumes:
      # Read-only mount of the committed graph. The default points at the
      # netbox-pyats repo's graphify-out (the active project repo). Override
      # GRAPHIFY_GRAPH_PATH in the worktree .env to serve a different repo's
      # graph, or point at a shared volume populated by the ATW-41 nightly
      # routine.
      - type: bind
        source: ${GRAPHIFY_GRAPH_PATH:-./graphify-out}
        target: /graph
        read_only: true
    healthcheck:
      test: ["CMD", "graphify-mcp-healthcheck"]
      start_period: 10s
      timeout: 3s
      interval: 15s
      retries: 3
    cpus: ${GRAPHIFY_MCP_CPUS:-0.5}
    mem_limit: ${GRAPHIFY_MCP_MEM:-256m}

networks:
  # Isolated bridge for the graphify HTTP server. Deliberately separate from
  # the dev stack's `devnet` so the graph server cannot reach
  # postgres/redis/netbox and they cannot reach it. Namespaced by
  # COMPOSE_PROJECT_NAME so worktree stacks get independent bridges.
  graphify-net:
    name: ${COMPOSE_PROJECT_NAME:-netbox-pyats}-graphify-net
    driver: bridge
    internal: false

secrets:
  # File-based secret. The service-level reference above sets uid/gid/mode
  # for the in-container mount. The file is generated by
  # scripts/graphify-mcp-key.sh and is .gitignored — never commit the key.
  graphify_api_key:
    file: dev/graphify-mcp/api-key